name: Generate SDK

on:
  repository_dispatch:
    types: [backend-updated]   # 监听来自后端的事件
  workflow_dispatch:           # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout SDK repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate SDK (download + convert + openapi-ts)
        run: npm run generate
        env:
          SWAGGER_RAW_URL: https://raw.githubusercontent.com/baiyibs/atelino-api/refs/heads/master/pkg/docs/swagger.json

      - name: Check for changes
        id: git_diff
        run: |
          git add -A
          git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git_diff.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-generate SDK from backend update [skip ci]"
          git push