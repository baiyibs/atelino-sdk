name: Generate SDK from Backend Swagger

on:
  workflow_dispatch:
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout SDK repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SDK
        run: npm run generate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        id: cpr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: 'baiyibs/atelino-sdk'
          commit-message: 'chore: auto-generate SDK from backend API spec'
          title: 'chore: auto-generate SDK'
          body: |
            This PR is auto-generated by the `generate-sdk` workflow.
            It updates the SDK code based on the latest backend OpenAPI specification.
          branch: 'auto/generated-sdk'
          base: 'master'
          delete-branch: true
          labels: 'auto-generated'

      - name: Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto \
            --merge \
            --subject "chore: auto-generate SDK (auto-merged)"